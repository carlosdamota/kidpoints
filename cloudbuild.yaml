steps:
  # Step 1: Create .env.production — args[] IS substituted by Cloud Build (unlike script:)
  - name: 'ubuntu'
    id: 'Create .env.production'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        printf 'VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY\n\
        VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN\n\
        VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID\n\
        VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET\n\
        VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID\n\
        VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID\n\
        VITE_FIREBASE_MEASUREMENT_ID=$_VITE_FIREBASE_MEASUREMENT_ID\n\
        VITE_FIREBASE_FIRESTORE_DATABASE_ID=$_VITE_FIREBASE_FIRESTORE_DATABASE_ID\n' > .env.production
        echo "=== .env.production contents ==="
        cat .env.production

  # Step 2: Build Docker image (.env.production is now in build context)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
      - '.'

  # Step 3: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_DEPLOY_REGION'
      - '--platform=$_PLATFORM'
      - '--allow-unauthenticated'
      - '--update-secrets=RESEND_API_KEY=RESEND_API_KEY:latest'

images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
