steps:
  # Step 1: Create .env.production from substitution variables
  # Vite reads .env.production during production builds — 100% reliable.
  # Note: .env.production is NOT in .dockerignore, so Docker copies it to the build context.
  - name: 'bash'
    script: |
      cat > .env.production << 'EOF'
      VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY
      VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN
      VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID
      VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET
      VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID
      VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID
      VITE_FIREBASE_MEASUREMENT_ID=$_VITE_FIREBASE_MEASUREMENT_ID
      VITE_FIREBASE_FIRESTORE_DATABASE_ID=$_VITE_FIREBASE_FIRESTORE_DATABASE_ID
      EOF
      echo "✅ .env.production created"
      cat .env.production
    env:
      - '_VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY'
      - '_VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN'
      - '_VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID'
      - '_VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET'
      - '_VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID'
      - '_VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID'
      - '_VITE_FIREBASE_MEASUREMENT_ID=$_VITE_FIREBASE_MEASUREMENT_ID'
      - '_VITE_FIREBASE_FIRESTORE_DATABASE_ID=$_VITE_FIREBASE_FIRESTORE_DATABASE_ID'

  # Step 2: Build Docker image (.env.production is now in build context)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
      - '.'

  # Step 3: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_DEPLOY_REGION'
      - '--platform=$_PLATFORM'
      - '--allow-unauthenticated'
      - '--update-secrets=RESEND_API_KEY=RESEND_API_KEY:latest'

images:
  - '$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
